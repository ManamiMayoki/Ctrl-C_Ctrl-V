<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mainBox">
        <img src="Images/drizzle.png" alt="Drizzle">
        <h1>Weather</h1>
        <h2>ForeCasts</h2>
        <button>Start</button>
    </div>


    <div class="mainBox">

        <div class="searchBox">
            <input type="text" placeholder="Enter City Name" id="inputField">
            <img src="Images/search.png" alt="Search" id="searchIcon">
        </div>

        <div class="iconBox">
            <img src="Images/clear.png" alt="Clear" id="icon">
            <p>Description</p>
        </div>

        <div class="tempBox">
            <h1 id="temp">0°C</h1>
            <h2 id="city">City</h2>
        </div>

        <div class="extraDetails">
            <div class="wind">
                <img src="Images/wind.png" alt="wind" id="windIcon">
                <div class="windData">
                    <p id="windSpeed">0 km/h</p>
                    <p>Wind</p>
                </div>
            </div>
            <div class="humidity">
                <img src="Images/humidity.png" alt="humidity" id="humidityIcon">
                <div class="humidityData">
                    <p id="humidity">0%</p>
                    <p>Humidity</p>
                </div>
            </div>
        </div>
    </div>


    <div class="mainBox">
        <h1>404</h1>
        <p>Oops! Page Not Found.</p>
        <p id="info">The requested page could not be found or does not exist or has been removed.</p>
        <button>Go Home</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
