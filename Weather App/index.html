<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="mainBox">
        <img src="Images/drizzle.png" alt="Drizzle">
        <h1 class="weather">Weather</h1>
        <h2 class="forecast">ForeCasts</h2>
        <button class="startbtn">Get Start</button>
    </div>


    <div class="mainBox">

        <div class="searchBox">
            <input type="text" placeholder="Enter City Name" id="inputField">
            <div class="img"><img src="Images/search.png" alt="Search" id="searchIcon"></div>3
        </div>

        <div class="iconBox">
            <img src="Images/clear.png" alt="Clear" id="icon">
            <p>Description</p>
        </div>

        <div class="tempBox">
            <h1 id="temp">0°C</h1>
            <h2 id="city">City</h2>
        </div>

        <div class="extraDetails">
            <div class="wind">
                <img src="Images/wind.png" alt="wind" id="windIcon">
                <div class="windData">
                    <p id="windSpeed">0 km/h</p>
                    <p>Wind</p>
                </div>
            </div>
            <div class="humidity">
                <img src="Images/humidity.png" alt="humidity" id="humidityIcon">
                <div class="humidityData">
                    <p id="humidity">0%</p>
                    <p>Humidity</p>
                </div>
            </div>
        </div>
    </div>


    <div class="mainBox">
        <h1>404</h1>
        <p>Oops! Page Not Found.</p>
        <p id="info">The requested page could not be found or does not exist or has been removed.</p>
        <button>Go Home</button>
    </div>
    <script src="app.js"></script>
</body>

</html>
